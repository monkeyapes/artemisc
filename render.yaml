services:
  - type: web
    name: artemisc-server
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && cd client && npm run build && cd ../server && npx prisma generate && npm run build
    startCommand: cd server && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: artemisc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"

databases:
  - name: artemisc-db
    region: oregon
    plan: free
    databaseName: artemisc
    user: artemisc
